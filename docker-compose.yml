version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa-dashboard-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro          # field_mapping.yaml
      - qa_data:/app/data                # SQLite database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - qa-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qa-dashboard-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qa-net

volumes:
  qa_data:

networks:
  qa-net:
    driver: bridge
